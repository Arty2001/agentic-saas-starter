name: frontend-build

on:
  push:
    branches:
      - 'main'
      - 'master'
      - 'feature'
      - 'release/**'
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - 'main'
      - 'master'
      - 'feature'
      - 'release/**'
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + build
        run: npm run build
